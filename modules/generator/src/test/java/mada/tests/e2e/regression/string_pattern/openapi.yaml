---
openapi: 3.0.1
info:
  title: Test
  version: 1.0.0
security:
- JWT: []
tags:
- name: Tag
paths:
  /add:
    post:
      tags:
      - Tag
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/klarTilBeslutningsGrundlagResponse'
      responses:
        "204":
          description: Success
components:
  schemas:
    klarTilBeslutningsGrundlagResponse:
      type: object
      required:
        - senestOpdat
      properties:
        # This should flatten to senest-optat, then bdws-timestamp
        senestOpdat:
          $ref: '#/components/schemas/senest-opdat'

    # This should flatten to bdws-timestamp
    senest-opdat:
      $ref: '#/components/schemas/bdws-timestamp'

    bdws-timestamp:
      type: string
      example: "2022-02-18-09.18.12.788990"
      pattern: '^(\d{4}-\d{2}-\d{2}-\d{2}.\d{2}.\d{2}.\d{6})$'

    badPatterns:
      type: object
      properties:
        # This is from dependency-track
        cpe:
          maxLength: 255
          minLength: 0
          pattern: "(cpe:2\\.3:[aho\\*\\-](:(((\\?*|\\*?)([a-zA-Z0-9\\-\\._]|(\\\\\
            [\\\\\\*\\?!\"#$$%&'\\(\\)\\+,/:;<=>@\\[\\]\\^`\\{\\|}~]))+(\\?*|\\*?))|[\\\
            *\\-])){5}(:(([a-zA-Z]{2,3}(-([a-zA-Z]{2}|[0-9]{3}))?)|[\\*\\-]))(:(((\\\
            ?*|\\*?)([a-zA-Z0-9\\-\\._]|(\\\\[\\\\\\*\\?!\"#$$%&'\\(\\)\\+,/:;<=>@\\\
            [\\]\\^`\\{\\|}~]))+(\\?*|\\*?))|[\\*\\-])){4})|([c][pP][eE]:/[AHOaho]?(:[A-Za-z0-9\\\
            ._\\-~%]*){0,6})"
          type: string
